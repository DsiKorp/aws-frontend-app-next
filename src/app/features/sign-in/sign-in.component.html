<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-4">
    <h2 class="mb-3">Sign In</h2>
    <form #usrForm="ngForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          class="form-control"
          required
          [(ngModel)]="username"
        />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          class="form-control"
          required
          [(ngModel)]="password"
        />
      </div>
      @if (auth.didFail()) {
        <div class="alert alert-danger py-2">
          @if (auth.confirmRequired()) {
            Your account is not confirmed yet. Redirecting you to enter the
            validation code…
          } @else {
            Invalid credentials.
          }
        </div>
      }
      @if (auth.isLoading()) {
        <div class="loader mb-3"></div>
      }
      <button
        type="submit"
        class="btn btn-primary w-100"
        [disabled]="auth.isLoading() || !usrForm.form.valid"
      >
        Sign In
      </button>
    </form>
    <p class="mt-3 text-center">
      Need an account?
      <a routerLink="/signup">Sign Up</a>
    </p>
  </div>
</div>
